# GeoPulse v2 — Full stack with Redis queues
services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: cis_thermometer
      POSTGRES_USER: thermo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermo -d cis_thermometer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    command: python scripts/collect.py --loop --interval 1800
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    command: python scripts/analyze.py --loop --interval 60 --batch 100
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  temperature:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/calc_temperature.py --loop --interval 3600
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  threads:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/build_threads.py --loop --interval 3600
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      JINA_API_KEY: ${JINA_API_KEY}
      COMTRADE_API_KEY: ${COMTRADE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
