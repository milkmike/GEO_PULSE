# GeoPulse v2 — Full stack with Redis queues
services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: cis_thermometer
      POSTGRES_USER: thermo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermo -d cis_thermometer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    command: python scripts/collect.py --loop --interval 1800
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      FIRECRAWL_URL: "http://172.18.0.1:3002"
      FIRECRAWL_KEY: "fc-test"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    command: python scripts/analyze.py --loop --interval 60 --batch 100
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_MODELS: ${LLM_MODELS:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  temperature:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/calc_temperature.py --loop --interval 3600
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  threads:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/build_threads.py --loop --interval 3600
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  integrity:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/check_integrity.py --loop --interval 86400 --apply
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # === WORLD EXPANSION ===
  gdelt-collector:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/collect_gdelt.py --loop --interval 21600
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      GDELT_PAUSE_SEC: ${GDELT_PAUSE_SEC:-5}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ru-index:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/calc_ru_index.py --loop --interval 3600
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  signals:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/detect_signals.py --loop --interval 1800
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  briefs:
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    command: python scripts/generate_briefs.py --loop --interval 7200
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_MODELS: ${LLM_MODELS:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  fx-collector:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/collect_fx.py --loop --interval 21600
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    ports:
      - "3334:3334"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      JINA_API_KEY: ${JINA_API_KEY}
      COMTRADE_API_KEY: ${COMTRADE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped


  # === VOX POPULI ===
  vox-collector:
    build:
      context: .
      dockerfile: src/vox/Dockerfile
    command: python -m src.vox.telegram_collector
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_SESSION: ${TELEGRAM_SESSION}
      VOX_POSTS_PER_CHANNEL: "100"
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  vox-analyzer:
    build:
      context: .
      dockerfile: src/vox/Dockerfile
    command: python -m src.vox.analyzer
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      VOX_MODEL: ${VOX_MODEL:-google/gemini-2.0-flash-001}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  vox-engine:
    build:
      context: .
      dockerfile: src/vox/Dockerfile
    command: python -m src.vox.engine
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped


  tg-collector:
    build:
      context: .
      dockerfile: Dockerfile.tg-collector
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      FIRECRAWL_URL: "http://172.18.0.1:3002"
      FIRECRAWL_KEY: "fc-test"
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_SESSION: ${TELEGRAM_SESSION:-geopulse_vox}
      TG_SESSION_PATH: /app/sessions
      TG_MODE: live
      TG_COLLECT_INTERVAL: "900"
      TG_MIN_POST_LENGTH: "80"
      TG_BACKFILL_LIMIT: "50"
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
volumes:
  pgdata:
