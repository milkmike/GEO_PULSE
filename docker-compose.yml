services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: cis_thermometer
      POSTGRES_USER: thermo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermo -d cis_thermometer"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build: .
    command: python scripts/collect.py --loop --interval 1800
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  analyzer:
    build: .
    command: python scripts/analyze.py --loop --interval 60 --batch 100
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PYTHONIOENCODING: utf-8
      LANG: C.UTF-8
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  temperature:
    build: .
    command: python scripts/calc_temperature.py --loop --interval 3600
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8101:8501"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  threads:
    build: .
    command: python scripts/build_threads.py --loop --interval 3600
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PYTHONIOENCODING: utf-8
      LANG: C.UTF-8
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
