# V2 Dev Stack — shares DB with v1, separate API port
services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - v2
      - v1_shared

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    command: python scripts/collect.py --loop --interval 1800
    environment:
      DATABASE_URL: postgresql://thermo:${DB_PASSWORD}@db:5432/cis_thermometer
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - v2
      - v1_shared

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    command: python scripts/analyze.py --loop --interval 60 --batch 100
    environment:
      DATABASE_URL: postgresql://thermo:${DB_PASSWORD}@db:5432/cis_thermometer
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - v2
      - v1_shared

  temperature:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/calc_temperature.py --loop --interval 3600
    environment:
      DATABASE_URL: postgresql://thermo:${DB_PASSWORD}@db:5432/cis_thermometer
    restart: unless-stopped
    networks:
      - v2
      - v1_shared

  threads:
    build:
      context: .
      dockerfile: Dockerfile.temperature
    command: python scripts/build_threads.py --loop --interval 3600
    environment:
      DATABASE_URL: postgresql://thermo:${DB_PASSWORD}@db:5432/cis_thermometer
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    restart: unless-stopped
    networks:
      - v2
      - v1_shared

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8102:8000"
    environment:
      DATABASE_URL: postgresql://thermo:${DB_PASSWORD}@db:5432/cis_thermometer
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - v2
      - v1_shared

networks:
  v2:
    driver: bridge
  v1_shared:
    external: true
    name: cis-thermometer_default
