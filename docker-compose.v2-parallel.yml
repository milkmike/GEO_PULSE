# V2 Parallel Stack — API + Redis only
# Workers stay on v1, DB shared via existing network
services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - v2
      - v1_shared

  api-v2:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8102:8000"
    environment:
      DATABASE_URL: postgresql://thermo:${DB_PASSWORD}@db:5432/cis_thermometer
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - v2
      - v1_shared

networks:
  v2:
    driver: bridge
  v1_shared:
    external: true
    name: cis-thermometer_default
